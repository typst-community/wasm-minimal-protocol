name: Release `wasm-minimal-protocol`

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without the leading `v` (e.g. `0.2.0`), should be synced with `Cargo.toml`"
        required: true
      body:
        description: "Description of the release"
        required: true
      dry-run:
        description: "Whether to perform a dry run without creating a real release"
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: sd
      - name: Generate README
        run: |
          cat ./README.md | sd --fixed-strings '](./' '](../../' > ./crates/macro/README.md
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-minimal-protocol-readme
          path: crates/macro/README.md
      - run: cargo build --release --package wasm-minimal-protocol
      - run: cargo publish --dry-run --package wasm-minimal-protocol

  gh-release:
    name: Create GitHub Release
    if: ${{ !inputs.dry-run }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v2
        with:
          name: wasm-minimal-protocol ${{ github.event.inputs.version }}
          tag_name: wasm-minimal-protocol-${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.body }}
          token: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: Publish to crates.io
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    needs: [build] # Only publish if the build succeeds
    environment: crates-io # For enhanced security
    permissions:
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: wasm-minimal-protocol-readme
          path: crates/macro/
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish --package wasm-minimal-protocol
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
