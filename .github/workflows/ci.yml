name: Check

env:
  EM_VERSION: 5.0.2
  EM_CACHE_FOLDER: "emsdk-cache"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Emscripten for hello_c
        uses: actions/cache@v5
        with:
          path: ${{env.EM_CACHE_FOLDER}}
          key: emsdk-${{env.EM_VERSION}}-${{ runner.os }}
      - name: Install Emscripten for hello_c
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: ${{env.EM_CACHE_FOLDER}}

      - name: Cache TinyGo for hello_go
        uses: actions/cache@v5
        with:
          path: tinygo_0.40.1_amd64.deb
          key: tinygo-0.40.1-${{ runner.os }}
      - name: Install TinyGo for hello_go
        run: |
          if [ ! -f tinygo_0.40.1_amd64.deb ]; then
            wget https://github.com/tinygo-org/tinygo/releases/download/v0.40.1/tinygo_0.40.1_amd64.deb
          fi
          sudo dpkg -i tinygo_0.40.1_amd64.deb
          export PATH=$PATH:/usr/local/bin

      - name: Install Zig for hello_zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache GHC WebAssembly backend for hello_haskell
        uses: actions/cache@v5
        with:
          path: ~/.ghc-wasm
          key: ghc-wasm-meta-9.14-${{ runner.os }}
      - name: Install GHC WebAssembly backend for hello_haskell
        env:
          FLAVOUR: "9.14"
        run: |
          if [ ! -d ~/.ghc-wasm ]; then
            curl https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta/-/raw/master/bootstrap.sh | sh
          fi
          ~/.ghc-wasm/add_to_github_path.sh

      - name: Cache MoonBit toolchain for hello_moonbit
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-0.8.3+cd28f524e-${{ runner.os }}
      - name: Install MoonBit toolchain for hello_moonbit
        env:
          MOONBIT_INSTALL_VERSION: 0.8.3+cd28f524e
        run: |
          if [ ! -f ~/.moon/bin/moon ]; then
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          fi
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip1
      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Typst compilers
        uses: typst-community/setup-typst@v5
        with:
          typst-versions-map: |
            {
              "typst": { "version": "v0.14.2" },
              "typst-0.13": { "version": "v0.13.1" },
              "typst-0.12": { "version": "v0.12.0" },
              "typst-0.11": { "version": "v0.11.1" },
              "typst-0.10": { "version": "v0.10.0" },
              "typst-0.9": { "version": "v0.9.0" },
              "typst-0.8": { "version": "v0.8.0" }
            }

      - name: Run pre-hook hook
        run: |
          rm target/example-result/ -rf # Clear cache to avoid ghost files

          CARGO_TEST_SAVE_EXAMPLE_RESULT=1 ./.githooks/pre-push

          echo '# Sizes of the resulting binaries' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pushd ./target/example-result/
          ls --sort=size --size --human-readable -1 *.wasm >> "$GITHUB_STEP_SUMMARY"
          popd
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload example-result
        uses: actions/upload-artifact@v7
        with:
          name: example-result
          path: target/example-result/

  check-wasi-stub-install:
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/install-action@v2
        with:
          tool: wasi-stub
      - run: wasi-stub --help
