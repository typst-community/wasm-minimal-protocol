[package]
name = "wasm-minimal-protocol"
version = "0.2.0"
edition = "2021"
readme = "README.md" # Generated from the repo README; see the notes in .gitignore there
authors = ["Astrale"]
license-file = "../../LICENSE"
description = "Typst plugin helper macro library"
repository = "https://github.com/typst-community/wasm-minimal-protocol"
categories = ["wasm", "development-tools::ffi", "no-std"]
keywords = ["typst", "plugin", "wasm", "WebAssembly", "bytes"]

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.36"
quote = "1.0.15"
venial = "0.5.0"

[dev-dependencies]
regex = "1.12.3"
semver = "1.0"
which = { version = "8.0.0", features = ["regex"] }
